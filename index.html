<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/scripts/analytics.js"></script>
    <script src="/scripts/cookie-consent.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polly Web – Neutral Protocol for Super-Apps</title>
    <link rel="icon" type="image/png" href="images/blue-flat-rounded.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <script src="scripts/component-loader.js" defer></script>
</head>
<body>
    <div data-component="components/hero.html"></div>
    <div data-component="components/vision.html"></div>
    <div data-component="components/demo.html"></div>
    <div data-component="components/solution.html"></div>
    <div data-component="components/final-cta.html"></div>
    <div data-component="components/footer.html"></div>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
    <script>
        function setCurrentYear() {
            const yearNode = document.getElementById('current-year');
            if (yearNode) {
                yearNode.textContent = String(new Date().getFullYear());
            }
        }

        function initPageInteractions() {
            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });

            // Intersection Observer for fade-in animations
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -100px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.stat-card, .feature-card, .comparison-row').forEach((el) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.6s ease';
                observer.observe(el);
            });
        }

        function boot() {
            setCurrentYear();
            initPageInteractions();
        }

        document.addEventListener('components:loaded', boot);

        if (!window.componentLoader) {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', boot, { once: true });
            } else {
                boot();
            }
        }
    </script>
</body>
</html>
